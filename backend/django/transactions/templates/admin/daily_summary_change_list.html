{% extends "admin/change_list.html" %}

{% block content_title %}
    <h1> Daily Payment Summary </h1>
{% endblock %}

{% block result_list %}
    <div class="results">
        <table>
            <thead>
              <tr>
                <th>
                  <div class="text">
                    <a href="#">Date</a>
                  </div>
                </th>
                <th>
                  <div class="text">
                    <a href="#">Total Transactions</a>
                  </div>
                </th>
                <th>
                  <div class="text">
                    <a href="#">Total Revenue</a>
                  </div>
                </th>
              </tr>
            </thead>
            <tbody>
              {% for row in summary %}
              <tr class="{% cycle 'row1' 'row2' %}">
                <td> {{ row.date }} </td>
                <td> {{ row.total_transactions }} </td>
                <td> <strong>${{ row.total_sales }}</strong> </td>
              </tr>
              {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
